name: Greetings
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
permissions:
  contents: read
jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            👋 Thanks for opening your first issue here! A maintainer will take a
            look soon. If you'd like to work on it yourself, comment `/assign` to
            assign it to you. See CONTRIBUTING.md to get started.
          pr-message: >
            🎉 Thanks for your first pull request! A lightweight CLA check runs on
            it — just post the one-line signature the bot asks for and it goes
            green. A maintainer will review shortly. See CONTRIBUTING.md for
            guidelines.
