# OpenSSF Scorecard — supply-chain security posture.
# Results publish to https://api.securityscorecards.dev (badge) and to the
# repo's Security > Code scanning tab. Public repo only.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '25 7 * * 1' # weekly, Monday
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write        # publish results to OpenSSF (OIDC)
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
