# CLA Assistant (lite). DORMANT until activated: set the repository variable
# CLA_ENABLED=true (Settings → Secrets and variables → Actions → Variables).
# Uses the built-in GITHUB_TOKEN — no OAuth app, no PAT. Signatures are committed
# to signatures/version1/cla.json in this repo.
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: read

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write
    # Only run on real PRs or the actual sign/recheck comment — otherwise a
    # comment on a plain issue crashes the action (it resolves the issue number
    # as a PR). Also skip the maintainer's own PRs (their commits carry a
    # Co-Authored-By tool trailer the CLA would otherwise flag). External
    # contributors still sign.
    if: >-
      ${{ vars.CLA_ENABLED == 'true'
          && github.event.pull_request.user.login != 'nqzai'
          && (github.event_name == 'pull_request_target'
              || github.event.comment.body == 'recheck'
              || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') }}
    steps:
      - name: "CLA Assistant"
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/nqzai/kakunin-sdk-typescript/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'nqzai,dependabot[bot],*[bot],renovate[bot]'
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge, please read and
            sign the [Kakunin Contributor License Agreement](https://github.com/nqzai/kakunin-sdk-typescript/blob/main/CLA.md)
            by posting the exact comment below in this PR.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️✅'
