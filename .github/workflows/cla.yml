# CLA Assistant (lite). DORMANT until activated: set the repository variable
# CLA_ENABLED=true (Settings → Secrets and variables → Actions → Variables).
# Uses the built-in GITHUB_TOKEN — no OAuth app, no PAT. Signatures are committed
# to signatures/version1/cla.json in this repo.
name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    # Skip the maintainer's own PRs — their commits carry a Co-Authored-By
    # trailer for a non-signing tool identity, which the CLA check would
    # otherwise demand a signature from. External contributors still sign.
    if: ${{ vars.CLA_ENABLED == 'true' && github.event.pull_request.user.login != 'nqzai' }}
    steps:
      - name: "CLA Assistant"
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/nqzai/kakunin-sdk-typescript/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'nqzai,dependabot[bot],*[bot],renovate[bot]'
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge, please read and
            sign the [Kakunin Contributor License Agreement](https://github.com/nqzai/kakunin-sdk-typescript/blob/main/CLA.md)
            by posting the exact comment below in this PR.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️✅'
