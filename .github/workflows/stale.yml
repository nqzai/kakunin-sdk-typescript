name: Close stale issues and PRs
on:
  schedule:
    - cron: '30 1 * * *'
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'good first issue,help wanted,pinned,security'
          exempt-pr-labels: 'pinned,security'
          stale-issue-message: 'Inactive for 60 days — marking stale. Comment to keep it open; otherwise it closes in 14 days.'
          stale-pr-message: 'Inactive for 60 days — marking stale. Push or comment to keep it open; otherwise it closes in 14 days.'
          close-issue-message: 'Closed after 14 days stale. Reopen anytime.'
          close-pr-message: 'Closed after 14 days stale. Reopen anytime.'
