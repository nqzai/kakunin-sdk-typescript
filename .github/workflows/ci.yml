name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, type-check & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
